<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 420" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <!-- Background -->
  <rect width="1100" height="420" fill="#ffffff"/>

  <!-- Vertical divider -->
  <line x1="560" y1="20" x2="560" y2="380" stroke="#f0f0f0" stroke-width="0.5"/>

  <!-- ============ LEFT PANEL: Component Attribution ============ -->
  <text x="30" y="40" font-size="15" font-weight="700" fill="#333333">Component Attribution</text>
  <text x="30" y="58" font-size="11" fill="#888888">GPT-4o-mini on GSM8K (8 PB runs)</text>

  <!-- Center axis line -->
  <line x1="310" y1="80" x2="310" y2="320" stroke="#cccccc" stroke-width="1"/>

  <!-- Tick at zero -->
  <text x="310" y="335" font-size="9" fill="#999999" text-anchor="middle">0.0</text>

  <!-- Bar 1: Output Format +0.058 (right, coral, ~120px) -->
  <text x="30" y="103" font-size="12" fill="#333333" font-weight="500">Output Format</text>
  <rect x="310" y="92" width="120" height="20" fill="#e07a5f"/>
  <line x1="430" y1="88" x2="430" y2="116" stroke="#999999" stroke-width="1"/>
  <line x1="424" y1="88" x2="436" y2="88" stroke="#999999" stroke-width="1"/>
  <line x1="424" y1="116" x2="436" y2="116" stroke="#999999" stroke-width="1"/>
  <text x="445" y="107" font-size="11" fill="#333333" font-weight="600">+0.058</text>

  <!-- Bar 2: Few-Shot +0.047 (right, coral, ~100px) -->
  <text x="30" y="135" font-size="12" fill="#333333" font-weight="500">Few-Shot</text>
  <rect x="310" y="124" width="100" height="20" fill="#e07a5f"/>
  <line x1="410" y1="120" x2="410" y2="148" stroke="#999999" stroke-width="1"/>
  <line x1="404" y1="120" x2="416" y2="120" stroke="#999999" stroke-width="1"/>
  <line x1="404" y1="148" x2="416" y2="148" stroke="#999999" stroke-width="1"/>
  <text x="425" y="139" font-size="11" fill="#333333" font-weight="600">+0.047</text>

  <!-- Bar 3: Constraints +0.023 (right, coral, ~50px) -->
  <text x="30" y="167" font-size="12" fill="#333333" font-weight="500">Constraints</text>
  <rect x="310" y="156" width="50" height="20" fill="#e07a5f"/>
  <line x1="360" y1="152" x2="360" y2="180" stroke="#999999" stroke-width="1"/>
  <line x1="354" y1="152" x2="366" y2="152" stroke="#999999" stroke-width="1"/>
  <line x1="354" y1="180" x2="366" y2="180" stroke="#999999" stroke-width="1"/>
  <text x="375" y="171" font-size="11" fill="#333333" font-weight="600">+0.023</text>

  <!-- Bar 4: CoT Trigger +0.010 (right, light coral, ~20px) -->
  <text x="30" y="199" font-size="12" fill="#333333" font-weight="500">CoT Trigger</text>
  <rect x="310" y="188" width="20" height="20" fill="#e8a895"/>
  <line x1="330" y1="184" x2="330" y2="212" stroke="#999999" stroke-width="1"/>
  <line x1="324" y1="184" x2="336" y2="184" stroke="#999999" stroke-width="1"/>
  <line x1="324" y1="212" x2="336" y2="212" stroke="#999999" stroke-width="1"/>
  <text x="345" y="203" font-size="11" fill="#666666" font-weight="500">+0.010</text>

  <!-- Bar 5: System Role -0.008 (left, steel blue, ~15px) -->
  <text x="30" y="231" font-size="12" fill="#333333" font-weight="500">System Role</text>
  <rect x="295" y="220" width="15" height="20" fill="#5b8db8"/>
  <line x1="295" y1="216" x2="295" y2="244" stroke="#999999" stroke-width="1"/>
  <line x1="289" y1="216" x2="301" y2="216" stroke="#999999" stroke-width="1"/>
  <line x1="289" y1="244" x2="301" y2="244" stroke="#999999" stroke-width="1"/>
  <text x="255" y="235" font-size="11" fill="#666666" font-weight="500">−0.008</text>

  <!-- Bar 6: Persona -0.033 (left, deep blue, ~70px) -->
  <text x="30" y="263" font-size="12" fill="#333333" font-weight="700">Persona</text>
  <rect x="240" y="252" width="70" height="20" fill="#1e3a5f"/>
  <line x1="240" y1="248" x2="240" y2="276" stroke="#999999" stroke-width="1"/>
  <line x1="234" y1="248" x2="246" y2="248" stroke="#999999" stroke-width="1"/>
  <line x1="234" y1="276" x2="246" y2="276" stroke="#999999" stroke-width="1"/>
  <text x="195" y="267" font-size="12" fill="#333333" font-weight="700">−0.033</text>
  <text x="155" y="280" font-size="9" fill="#888888" font-style="italic">← counterintuitive</text>

  <!-- Footer note -->
  <text x="30" y="348" font-size="11" fill="#888888" font-style="italic">Positive = helps accuracy, Negative = hurts</text>

  <!-- ============ RIGHT PANEL: Entanglement Matrix ============ -->
  <text x="590" y="40" font-size="15" font-weight="700" fill="#333333">Output Entanglement</text>
  <text x="590" y="58" font-size="11" fill="#888888">GPT-4o-mini outputs (n=100 per pair), HSIC test, BH-corrected</text>

  <!-- Heatmap setup: 6x6, cell size 38px, starting at x=680, y=110 -->
  <!-- Column labels (rotated 45 degrees) at top -->
  <g font-size="11" fill="#555555" font-weight="500">
    <text transform="translate(699, 100) rotate(-45)" text-anchor="start">Sys</text>
    <text transform="translate(737, 100) rotate(-45)" text-anchor="start">Pers</text>
    <text transform="translate(775, 100) rotate(-45)" text-anchor="start">Few</text>
    <text transform="translate(813, 100) rotate(-45)" text-anchor="start">CoT</text>
    <text transform="translate(851, 100) rotate(-45)" text-anchor="start">Fmt</text>
    <text transform="translate(889, 100) rotate(-45)" text-anchor="start">Cons</text>
  </g>

  <!-- Row labels on the left -->
  <g font-size="11" fill="#555555" font-weight="500">
    <text x="670" y="135" text-anchor="end">Sys</text>
    <text x="670" y="173" text-anchor="end">Pers</text>
    <text x="670" y="211" text-anchor="end">Few</text>
    <text x="670" y="249" text-anchor="end">CoT</text>
    <text x="670" y="287" text-anchor="end">Fmt</text>
    <text x="670" y="325" text-anchor="end">Cons</text>
  </g>

  <!-- Heatmap cells: 6x6 grid -->
  <!-- Significance pattern (symmetric, 13/15 pairs significant; non-significant pairs: (sys,cot) and (per,fmt)) -->
