  <rect x="680" y="234" width="36" height="36" fill="#d8d8d8"/><text x="698" y="256" font-size="9" fill="#888888" text-anchor="middle">ns</text>
  <rect x="718" y="234" width="36" height="36" fill="#e07a5f"/><text x="736" y="256" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">*</text>
  <rect x="756" y="234" width="36" height="36" fill="#e07a5f"/><text x="774" y="256" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">*</text>
  <rect x="794" y="234" width="36" height="36" fill="#444444"/>
  <rect x="832" y="234" width="36" height="36" fill="#e07a5f"/><text x="850" y="256" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">*</text>
  <rect x="870" y="234" width="36" height="36" fill="#e07a5f"/><text x="888" y="256" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">*</text>

  <!-- Row 5: fmt -->
  <rect x="680" y="272" width="36" height="36" fill="#e07a5f"/><text x="698" y="294" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">*</text>
  <rect x="718" y="272" width="36" height="36" fill="#d8d8d8"/><text x="736" y="294" font-size="9" fill="#888888" text-anchor="middle">ns</text>
  <rect x="756" y="272" width="36" height="36" fill="#e07a5f"/><text x="774" y="294" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">*</text>
  <rect x="794" y="272" width="36" height="36" fill="#e07a5f"/><text x="812" y="294" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">*</text>
  <rect x="832" y="272" width="36" height="36" fill="#444444"/>
  <rect x="870" y="272" width="36" height="36" fill="#e07a5f"/><text x="888" y="294" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">*</text>

  <!-- Row 6: con -->
  <rect x="680" y="310" width="36" height="36" fill="#e07a5f"/><text x="698" y="332" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">*</text>
  <rect x="718" y="310" width="36" height="36" fill="#e07a5f"/><text x="736" y="332" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">*</text>
  <rect x="756" y="310" width="36" height="36" fill="#e07a5f"/><text x="774" y="332" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">*</text>
  <rect x="794" y="310" width="36" height="36" fill="#e07a5f"/><text x="812" y="332" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">*</text>
  <rect x="832" y="310" width="36" height="36" fill="#e07a5f"/><text x="850" y="332" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">*</text>
  <rect x="870" y="310" width="36" height="36" fill="#444444"/>

  <!-- Summary line -->
  <text x="793" y="375" font-size="11" font-weight="700" fill="#e07a5f" text-anchor="middle">13/15 pairs significant — high entanglement</text>

  <!-- ============ BOTTOM STRIP ============ -->
  <rect x="0" y="385" width="1100" height="35" fill="#f8f8f8"/>
  <text x="550" y="407" font-size="11" fill="#888888" text-anchor="middle">Generated by prompt-doe in ~20 minutes  |  1,600 API calls  |  ~$5 in credits</text>
