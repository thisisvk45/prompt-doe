  <rect x="718" y="120" width="36" height="36" fill="#e07a5f"/><text x="736" y="142" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">*</text>
  <rect x="756" y="120" width="36" height="36" fill="#e07a5f"/><text x="774" y="142" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">*</text>
  <rect x="794" y="120" width="36" height="36" fill="#d8d8d8"/><text x="812" y="142" font-size="9" fill="#888888" text-anchor="middle">ns</text>
  <rect x="832" y="120" width="36" height="36" fill="#e07a5f"/><text x="850" y="142" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">*</text>
  <rect x="870" y="120" width="36" height="36" fill="#e07a5f"/><text x="888" y="142" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">*</text>

  <!-- Row 2: per -->
  <rect x="680" y="158" width="36" height="36" fill="#e07a5f"/><text x="698" y="180" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">*</text>
  <rect x="718" y="158" width="36" height="36" fill="#444444"/>
  <rect x="756" y="158" width="36" height="36" fill="#e07a5f"/><text x="774" y="180" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">*</text>
  <rect x="794" y="158" width="36" height="36" fill="#e07a5f"/><text x="812" y="180" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">*</text>
  <rect x="832" y="158" width="36" height="36" fill="#d8d8d8"/><text x="850" y="180" font-size="9" fill="#888888" text-anchor="middle">ns</text>
  <rect x="870" y="158" width="36" height="36" fill="#e07a5f"/><text x="888" y="180" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">*</text>

  <!-- Row 3: fs -->
  <rect x="680" y="196" width="36" height="36" fill="#e07a5f"/><text x="698" y="218" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">*</text>
  <rect x="718" y="196" width="36" height="36" fill="#e07a5f"/><text x="736" y="218" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">*</text>
  <rect x="756" y="196" width="36" height="36" fill="#444444"/>
  <rect x="794" y="196" width="36" height="36" fill="#e07a5f"/><text x="812" y="218" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">*</text>
  <rect x="832" y="196" width="36" height="36" fill="#e07a5f"/><text x="850" y="218" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">*</text>
  <rect x="870" y="196" width="36" height="36" fill="#e07a5f"/><text x="888" y="218" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">*</text>

